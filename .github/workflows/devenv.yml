name: docker

on:
  workflow_call:
    inputs:
      image:
        description: "Docker Image to build"
        default: ${{ github.repository }}
        required: false
        type: string
      username:
        description: "Docker Hub Username"
        default: ${{ github.repository_owner }}
        required: false
        type: string
      devenv:
        description: "Path to the devenv directory"
        default: "."
        required: false
        type: string
    secrets:
      dockerhub-token:
        description: "Docker Hub Token"
        required: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - run: |
          echo "Logging in as user ${{ inputs.username }} with token ${{ secrets.dockerhub-token }}"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ inputs.username }}
          password: ${{ secrets.dockerhub-token }}

      # Build the Docker image
      - name: build `dev` image
        uses: docker/build-push-action@v6
        with:
          load: true
          tags: ${{ inputs.image }}:dev
          cache-from: type=registry,ref=${{ inputs.image }}:cache:devenv-dev

      # Run the minimum required tests to validate the image
      # Make sure the current image is being built and used, and not a remote one
      - run: docker compose run --build --rm devenv task lint
        env:
          DEVENV: ${{ inputs.devenv }}
        continue-on-error: true

      # Build the Docker image and Push it to Docker Hub
      - name: build and push `dev` image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ inputs.image }}:dev
          cache-from: type=registry,ref=${{ inputs.image }}:cache:devenv-dev
          cache-to: type=registry,ref=${{ inputs.image }}/cache:devenv-dev,mode=max
