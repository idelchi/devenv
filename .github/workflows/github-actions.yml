name: devenv
on: [push, pull_request, workflow_dispatch]

env:
  BRANCH: ${{ github.head_ref || github.ref_name }}
  IMAGE: ${{ github.repository }}
  PROJECT: devenv
  DEVENV: "."

jobs:
  info:
    uses: ./.github/workflows/info.yml

  verify:
    runs-on: ubuntu-24.04
    needs: info
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build the Docker image
      # Use inline cache to speed up the build
      # Load it into the local Docker daemon
      - name: build `dev` image
        uses: docker/build-push-action@v6
        with:
          load: true
          tags: ${{ env.IMAGE }}:dev
          cache-from: type=registry,ref=${{ env.IMAGE }}:dev-buildcache

      # # Run the minimum required tests to validate the image
      # # Make sure the current image is being built and used, and not a remote one
      # - run: docker compose run --build --rm devenv task lint

      # Build the Docker image and Push it to Docker Hub
      # The cache should still be available from the previous step
      # Push the inline cache to Docker Hub
      - name: build and push `dev` image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ env.IMAGE }}:dev
          cache-to: type=registry,ref=${{ env.IMAGE }}/cache/dev,mode=max

  release:
    needs: verify
    permissions:
      contents: write
    uses: ./.github/workflows/docker.yml

  cleanup:
    needs: release
    permissions:
      actions: write
    uses: ./.github/workflows/cleanup.yml
