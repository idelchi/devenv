name: devenv

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  info:
    uses: ./.github/workflows/info.yml

  verify:
    needs: info
    uses: ./.github/workflows/devenv.yml
    secrets: inherit

  release:
    # if: github.ref == 'refs/heads/main'
    needs: verify
    permissions:
      contents: write
    uses: ./.github/workflows/docker.yml
    secrets: inherit

  cleanup:
    if: always()
    needs: release
    permissions:
      actions: write
    uses: ./.github/workflows/cleanup.yml
